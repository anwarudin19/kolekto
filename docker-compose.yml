services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kolekto-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      TZ: Asia/Jakarta
      LOG_DIR: /app/logs
      LOG_RETENTION_DAYS: 14
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./backend/logs:/app/logs
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.middlewares.kolekto-api-redirect-https.redirectscheme.scheme=https
      - traefik.http.middlewares.kolekto-api-gzip.compress=true
      - traefik.http.routers.kolekto-api-http.entrypoints=http
      - traefik.http.routers.kolekto-api-http.rule=Host(`kolekto.anwarudin.web.id`) && PathPrefix(`/api`)
      - traefik.http.routers.kolekto-api-http.middlewares=kolekto-api-redirect-https
      - traefik.http.routers.kolekto-api-https.entrypoints=https
      - traefik.http.routers.kolekto-api-https.rule=Host(`kolekto.anwarudin.web.id`) && PathPrefix(`/api`)
      - traefik.http.routers.kolekto-api-https.tls=true
      - traefik.http.routers.kolekto-api-https.tls.certresolver=letsencrypt
      - traefik.http.routers.kolekto-api-https.middlewares=kolekto-api-gzip
      - traefik.http.routers.kolekto-api-https.priority=100
      - traefik.http.services.kolekto-api.loadbalancer.server.port=3000
    networks:
      - default
      - coolify
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: kolekto-web
    restart: unless-stopped
    environment:
      TZ: Asia/Jakarta
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "127.0.0.1:3001:3000"
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.middlewares.kolekto-web-redirect-https.redirectscheme.scheme=https
      - traefik.http.middlewares.kolekto-web-gzip.compress=true
      - traefik.http.routers.kolekto-web-http.entrypoints=http
      - traefik.http.routers.kolekto-web-http.rule=Host(`kolekto.anwarudin.web.id`) && PathPrefix(`/`)
      - traefik.http.routers.kolekto-web-http.middlewares=kolekto-web-redirect-https
      - traefik.http.routers.kolekto-web-https.entrypoints=https
      - traefik.http.routers.kolekto-web-https.rule=Host(`kolekto.anwarudin.web.id`) && PathPrefix(`/`)
      - traefik.http.routers.kolekto-web-https.tls=true
      - traefik.http.routers.kolekto-web-https.tls.certresolver=letsencrypt
      - traefik.http.routers.kolekto-web-https.middlewares=kolekto-web-gzip
      - traefik.http.routers.kolekto-web-https.priority=1
      - traefik.http.services.kolekto-web.loadbalancer.server.port=3000
    networks:
      - default
      - coolify
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: kolekto-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      TZ: Asia/Jakarta
      PGTZ: Asia/Jakarta
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - timezone=Asia/Jakarta
      - -c
      - log_timezone=Asia/Jakarta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: kolekto-minio
    restart: unless-stopped
    environment:
      TZ: Asia/Jakarta
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1" ]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: kolekto-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY; mc mb -p local/$$MINIO_BUCKET || true; exit 0; "
    restart: "no"

  redis:
    image: redis:8.6.2-alpine
    container_name: kolekto-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Jakarta
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}" ]
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  redis_data:

networks:
  coolify:
    external: true



